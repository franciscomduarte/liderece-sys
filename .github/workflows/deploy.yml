name: Deploy Produção

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Executar deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: SEU_IP
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            BASE_DIR=/var/www/seu-projeto
            RELEASES_DIR=$BASE_DIR/releases
            NEW_RELEASE=$RELEASES_DIR/$(date +%Y%m%d%H%M%S)

            echo "📦 Criando nova release..."
            mkdir -p $NEW_RELEASE

            echo "⬇️ Clonando projeto..."
            git clone git@github.com:SEU_USUARIO/SEU_REPO.git $NEW_RELEASE

            cd $NEW_RELEASE

            echo "📦 Instalando dependências..."
            composer install --no-dev --optimize-autoloader

            echo "🔗 Linkando arquivos compartilhados..."
            ln -s $BASE_DIR/shared/.env .env
            rm -rf storage
            ln -s $BASE_DIR/shared/storage storage

            echo "🔑 Gerando chave Laravel..."
            php artisan key:generate --force

            echo "🗄️ Rodando migrations..."
            php artisan migrate --force

            echo "⚡ Cache otimizado..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "🔄 Atualizando release atual..."
            ln -sfn $NEW_RELEASE $BASE_DIR/current

            echo "🧹 Limpando releases antigas..."
            ls -dt $RELEASES_DIR/* | tail -n +6 | xargs rm -rf

            echo "✅ Deploy finalizado!"