name: Deploy Produção

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 31.97.82.45
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            BASE_DIR=/var/www/liderece-sys
            RELEASES_DIR=$BASE_DIR/releases
            SHARED_DIR=$BASE_DIR/shared
            NEW_RELEASE=$RELEASES_DIR/$(date +%Y%m%d%H%M%S)

            echo "📦 Criando nova release..."
            mkdir -p $NEW_RELEASE

            echo "⬇️ Clonando repositório..."
            git clone git@github.com:franciscomduarte/liderece-sys.git $NEW_RELEASE

            cd $NEW_RELEASE

            echo "📦 Instalando dependências PHP..."
            composer install --no-dev --prefer-dist --optimize-autoloader

            echo "📦 Instalando dependências Node..."
            npm ci || npm install
            npm run build

            echo "🔗 Linkando arquivos compartilhados..."
            ln -s $SHARED_DIR/.env .env

            rm -rf storage
            ln -s $SHARED_DIR/storage storage

            echo "📁 Preparando cache do Laravel..."
            mkdir -p bootstrap/cache
            chmod -R 775 bootstrap/cache

            echo "🔐 Ajustando permissões..."
            chown -R www-data:www-data $NEW_RELEASE

            echo "🔄 Atualizando versão atual..."
            ln -sfn $NEW_RELEASE $BASE_DIR/current
            cd $BASE_DIR/current

            echo "🗄️ Rodando migrations..."
            php artisan migrate --force

            echo "⚡ Limpando e otimizando Laravel..."
            php artisan config:clear
            php artisan cache:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "🔁 Reiniciando filas..."
            php artisan queue:restart || true

            echo "🧹 Limpando releases antigas..."
            ls -dt $RELEASES_DIR/* | tail -n +6 | xargs rm -rf

            echo "✅ Deploy finalizado!!!"