script: |
  set -e

  BASE_DIR=/var/www/liderece-sys
  RELEASES_DIR=$BASE_DIR/releases
  SHARED_DIR=$BASE_DIR/shared
  NEW_RELEASE=$RELEASES_DIR/$(date +%Y%m%d%H%M%S)

  echo "рЯУ¶ Criando nova release..."
  mkdir -p $NEW_RELEASE

  echo "вђЗпЄП Clonando reposit√≥rio..."
  git clone git@github.com:franciscomduarte/liderece-sys.git $NEW_RELEASE

  cd $NEW_RELEASE

  echo "рЯУ¶ Instalando depend√™ncias PHP..."
  composer install --no-dev --prefer-dist --optimize-autoloader

  echo "рЯУ¶ Instalando depend√™ncias Node..."
  npm ci || npm install
  npm run build

  echo "рЯФЧ Linkando arquivos compartilhados..."
  ln -s $SHARED_DIR/.env .env

  rm -rf storage
  ln -s $SHARED_DIR/storage storage

  mkdir -p bootstrap/cache
  chmod -R 775 bootstrap/cache

  echo "рЯФД Atualizando vers√£o atual..."
  ln -sfn $NEW_RELEASE $BASE_DIR/current
  cd $BASE_DIR/current

  echo "рЯЧДпЄП Rodando migrations..."
  php artisan migrate --force

  echo "вЪ° Limpando e otimizando Laravel..."
  php artisan config:clear
  php artisan cache:clear
  php artisan config:cache
  php artisan route:cache
  php artisan view:cache

  echo "рЯФБ Reiniciando filas..."
  php artisan queue:restart || true

  echo "рЯІє Limpando releases antigas..."
  ls -dt $RELEASES_DIR/* | tail -n +6 | xargs rm -rf

  echo "вЬЕ Deploy finalizado!!!"